[project]
name = "luna-agent-plugin-sdk"
version = "0.3.0"
description = "Public plugin contracts and test helpers for Luna Agent"
requires-python = ">=3.12"
dependencies = [
    "packaging>=24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/luna_agent_plugin_sdk", "src/lumora_plugin_sdk"]
