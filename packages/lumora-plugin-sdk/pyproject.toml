[project]
name = "lumora-plugin-sdk"
version = "0.1.0"
description = "Public plugin contracts and test helpers for Lumora"
requires-python = ">=3.12"
dependencies = [
    "packaging>=24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lumora_plugin_sdk"]
