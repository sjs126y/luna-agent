agent:
  ui: inline
  max_iterations: 50
  max_tool_calls_per_turn: 40
execution:
  mode: ask-first
permissions:
  grant_ttl_minutes: 60
  confirm_timeout_seconds: 120
  tool_approval:
    default_external: cached
    tools:
      process_kill: prompt
      worktree_merge: prompt
      worktree_cleanup: prompt
    mcp_servers: {}
  approval_reviewer:
    enabled: true
    model: gpt-5.6-terra
    timeout_seconds: 12
    fallback: human
    allow_ttl_grant: false
    max_risk: medium
agents:
  max_concurrent_runs: 4
  max_tool_calls: 10
  max_tokens: 4096
  history_limit: 100
storage:
  data_dir: ./data
  log_level: INFO
artifacts:
  max_file_bytes: 20971520
  max_per_turn: 10
  retention_hours: 24
compression:
  engine: compressor
  model: ''
  retained_user_tokens: 20000
  tail_token_budget: 20000
  threshold_ratio: 0.9
toolsets:
  enabled:
  - all
memory:
  external_provider: luna
  review:
    external_turn_interval: 10
    internal_turn_interval: 50
    internal_buffer_limit: 20
    snapshot_refresh_turn_interval: 20
    worker_concurrency: 2
  llm:
    provider: inherit
    model: ''
    api_mode: auto
    max_tokens: 2048
  providers:
    luna:
      embedding:
        provider: openai_compatible
        base_url: https://llm-emwc1qhbxb5bsk0u.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
        api_key_env: DASHSCOPE_API_KEY
        model: text-embedding-v4
        dimensions: 1024
        timeout_seconds: 30
        batch_size: 10
      vector:
        provider: qdrant
        path: ./data/memory/qdrant
        collection: lumora_memories
      keyword:
        provider: sqlite_fts5
        tokenizer: unicode61
      fusion:
        provider: weighted_rrf
        semantic_weight: 0.6
        keyword_weight: 0.4
        importance_weight: 0.1
        rrf_k: 60
      reranker:
        provider: none
      retrieval:
        semantic_timeout_seconds: 35
        keyword_timeout_seconds: 5
        reranker_timeout_seconds: 30
    mem0:
      options: {}
multimodal:
  enabled: true
  image_mode: auto
  audio_mode: auto
  video_mode: 'off'
  file_mode: auto
  native_fallback: notice
  text_extract_max_chars: 12000
  text_extract_pdf_max_pages: 20
  image_text_mode: auto
  image_text_cache: true
  image_text_max_chars: 6000
  image_text_provider: openai
  image_text_api_mode: responses
  image_text_model: gpt-5.5
  image_text_prompt: ''
  ocr_endpoint: ''
  ocr_timeout_seconds: 20
  ocr_language: auto
cron:
  enabled: false
session:
  expire_days: 30
  override: {}
sandbox:
  roots:
  - .
  - /mnt/c/Users/MR/Desktop/SJS-AGENT
  - /mnt/c/Users/MR/Desktop/luna workspace
  read_roots:
  - /home/sujinsheng
  blocked:
  - '**/.env'
  - '**/.env.*'
  - '**/.git/**'
  - '**/.ssh/**'
  - '**/id_rsa*'
  - '**/.netrc'
  - '**/data/auth/**'
  - '**/node_modules/**'
  - '**/__pycache__/**'
  - '**/.venv/**'
  - '**/.claude/**'
  - '**/.codex/**'
  - '**/.aws/**'
  - '**/.kube/**'
  - '**/.gnupg/**'
  - '**/.docker/config.json'
  - '**/.config/gh/**'
  - '**/.config/gcloud/**'
  - '**/.npmrc'
  - '**/.pypirc'
  - '**/.pgpass'
  - '**/audit.log'
  - '**/pyproject.toml'
  - '**/config.yaml'
  bash_work_dir: ./data
  bash_restrict_paths: true
  bash_allow_network: false
  process_backend: auto
  file_max_write_bytes: 100000
  audit_enabled: true
auth:
  enabled: true
  owner_ids:
    wechat:
    - o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat
profiles:
  wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat: luna
plugins:
  dirs:
  - ./plugins
  - ./data/plugins
  enabled:
  - integrations/codex-bridge
  - integrations/github-assistant
  - integrations/developer-docs
  - integrations/browser-operator
  - integrations/workspace-watch
  - automation/reminder
  - automation/feed-watch
  - automation/inbox-watch
  - automation/luna-companion
  - platforms/qq
  disabled: []
  runtime:
    isolate_external: true
    sandbox_backend: auto
    allow_network: false
    startup_timeout_seconds: 45
    shutdown_timeout_seconds: 10
    restart_backoff_seconds:
    - 1
    - 2
    - 5
    - 10
    - 30
    restart_failure_window_seconds: 300
    restart_failure_limit: 5
  config:
    integrations/workspace-watch:
      paths:
      - data/workspace-watch-test.txt
      session_key: wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat
      poll_interval_seconds: 2
      settle_seconds: 2
      active:
        enabled: true
        sessions:
        - wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat
        restart_backoff_seconds:
        - 1
        - 2
        - 5
    automation/reminder:
      max_overdue_seconds: 604800
      retry_delay_seconds: 60
      max_delivery_attempts: 3
      active:
        enabled: true
        sessions:
        - wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat
        restart_backoff_seconds:
        - 1
        - 2
        - 5
        - 10
        - 30
    automation/feed-watch:
      feeds:
      - name: Codex Releases
        url: https://github.com/openai/codex/releases.atom
        sessions:
        - wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat
      poll_interval_seconds: 900
      max_items_per_feed: 30
      trusted_private_hosts:
      - github.com
      active:
        enabled: true
        sessions:
        - wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat
        restart_backoff_seconds:
        - 1
        - 2
        - 5
        - 10
        - 30
    automation/inbox-watch:
      root: data/inbox
      poll_interval_seconds: 15
      settle_seconds: 5
      max_files_per_poll: 20
      max_file_bytes: 20971520
      extensions: []
      process_existing: true
      active:
        enabled: true
        sessions:
        - wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat
        restart_backoff_seconds:
        - 1
        - 2
        - 5
        - 10
        - 30
    automation/luna-companion:
      active:
        enabled: true
        sessions:
        - wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat
        restart_backoff_seconds:
        - 1
        - 2
        - 5
        - 10
        - 30
      quiet_hours:
      - - '23:00'
        - 08:00
      max_daily_messages: 3
      min_gap_seconds: 7200
      review_threshold: 0.75
      expire_after_seconds: 86400
      check_in:
        enabled: true
        min_silence_seconds: 28800
      follow_up:
        enabled: true
        max_recent_messages: 3
    integrations/codex-bridge:
      command: codex
      source_codex_home: /home/sujinsheng/.codex
      runtime_codex_home: ./data/codex-bridge
      development_root: /home/sujinsheng/.local/share/luna-agent/plugin-workspaces
      cwd: .
      sandbox: workspace-write
      approval_policy: on-request
      approvals_reviewer: user
      event_retention: 1000
      active:
        enabled: true
        sessions:
        - wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat
      connect_timeout_seconds: 60
      call_timeout_seconds: 1800
    integrations/github-assistant:
      repositories:
      - openai/codex
      write_enabled: false
      active:
        enabled: true
        sessions:
        - wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat
      watch:
        pull_requests: true
        issues: true
        commits: true
        workflows: true
        poll_interval_seconds: 30
        per_page: 20
    integrations/developer-docs:
      command: npx
      package: '@upstash/context7-mcp'
      connect_timeout_seconds: 60
      call_timeout_seconds: 120
    integrations/browser-operator:
      command: npx
      package: '@playwright/mcp@0.0.78'
      browser: chromium
      headless: true
      isolated: true
      allowed_domains: []
      allow_file_upload: false
      allow_code_execution: false
      connect_timeout_seconds: 120
      call_timeout_seconds: 120
      max_artifact_bytes: 10485760
mcp:
  enabled: true
  servers:
  - name: filesystem
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-filesystem'
    - .
    allow_network: true
    enabled: false
  - name: memory
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-memory'
    env:
      MEMORY_FILE_PATH: ./data/mcp/memory.jsonl
    allow_network: true
    enabled: true
  - name: sequential-thinking
    transport: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-sequential-thinking'
    allow_network: true
    enabled: true
  - name: time
    transport: stdio
    command: uvx
    args:
    - mcp-server-time
    - --local-timezone
    - Asia/Shanghai
    connect_timeout_seconds: 60
    allow_network: true
    enabled: true
  - name: fetch
    transport: stdio
    command: uvx
    args:
    - mcp-server-fetch
    connect_timeout_seconds: 60
    allow_network: true
    enabled: true
