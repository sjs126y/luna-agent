# Personal Agent — behavioral configuration
# API keys / base URLs / secrets → .env

agent:
  ui: "inline"                    # inline
  max_iterations: 30
  max_tool_calls_per_turn: 20

execution:
  mode: "standard"                # guarded | standard | trusted | sovereign
  policy: {}                      # optional permission overrides, e.g. {"tool_permissions": {"bash": "ask"}}

agents:
  max_concurrent_runs: 4          # max active delegated sub-agents
  max_tool_calls: 10              # max tool calls per delegated sub-agent
  max_tokens: 4096                # max output tokens per delegated sub-agent
  history_limit: 100              # recent sub-agent runs kept in memory

storage:
  data_dir: "./data"
  log_level: "INFO"

compression:
  engine: "compressor"       # compressor (built-in) | lcm (future)
  model: ""                  # empty = use main model; set = cheap model
  max_tokens: 500
  tail_token_budget: 20000
  threshold_ratio: 0.6

toolsets:
  enabled: ["all"]            # ["all"] | ["web","terminal","utility"] | etc.

memory:
  provider: "file"           # built-in memory provider
  external_provider: "embedding"  # external: "none" | "embedding"
  review_interval: 10               # auto-review every N turns, 0=disabled

cron:
  enabled: false

session:
  expire_days: 30
  override: {}               # {"wechat:o9cq80:o9cq80": "wechat:custom:o9cq80"}

sandbox:
  roots:                           # allowed directories (boundary for all file tools + bash)
    - "/home/sujinsheng/projects/Personal-Agent"
    - "/mnt/c/Users/MR/Desktop/SJS-AGENT"
    - "/mnt/c/Users/MR/Desktop/luna workspace"
  blocked:                         # never accessible — glob patterns, applies to all tools
    - "**/.env"
    - "**/.env.*"
    - "**/.git/**"
    - "**/.ssh/**"
    - "**/id_rsa*"
    - "**/.netrc"
    - "**/data/auth/**"
    - "**/node_modules/**"
    - "**/__pycache__/**"
    - "**/.venv/**"
    - "**/.claude/**"
    - "**/audit.log"
    - "**/pyproject.toml"
    - "**/config.yaml"
  bash_work_dir: "./data"          # bash cwd (relative paths resolved from here)
  bash_restrict_paths: true        # false = bash can access paths outside sandbox roots
  bash_allow_network: false        # true = allow curl/pip/wget in bash tool
  file_max_write_bytes: 100000     # max file_write size
  audit_enabled: true              # log to data/audit.log

auth:
  enabled: true               # true = enable auth (static + pairing)
  admins: []                  # admin user IDs (always pass, no challenge)
  allowed_users: []           # pre-approved user IDs (skip pairing)

profiles:
  # Map session_key → profile directory under data/system/
  # The matching profile's .md files replace the default system prompt.
  # Example: "wechat:<wx_id>:<wx_id>": "girlfriend"
  # Fill in your own session keys below.
  "wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat": "girlfriend"

mcp:
  enabled: true               # enable MCP client subsystem
  servers:
    - name: "filesystem"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-filesystem", "/mnt/c/Users/MR"]
      enabled: true

    - name: "github"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-github"]
      env:
        GITHUB_PERSONAL_ACCESS_TOKEN: ""  # fill in your token
      enabled: false  # enable after setting token

    - name: "memory"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-memory", "--storage-path", "./data/mcp/memory.json"]
      enabled: true

    - name: "sequential-thinking"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
      enabled: true
