# Luna Agent — behavioral configuration
# API keys / base URLs / secrets → .env

agent:
  ui: "inline"                    # inline
  max_iterations: 50
  max_tool_calls_per_turn: 40

execution:
  mode: "ask-first"               # read-only | ask-first | local-auto | full-auto

permissions:
  grant_ttl_minutes: 60           # shared in-memory TTL for tool and resource grants
  confirm_timeout_seconds: 120
  tool_approval:
    # Local/Full Auto 自动放行继承的 cached；Ask First 仍会询问。显式覆盖始终优先。
    default_external: "cached"    # auto | cached | prompt | deny
    tools:
      process_kill: "prompt"
      worktree_merge: "prompt"
      worktree_cleanup: "prompt"
    mcp_servers: {}

agents:
  max_concurrent_runs: 4          # max active delegated sub-agents
  max_tool_calls: 10              # max tool calls per delegated sub-agent
  max_tokens: 4096                # max output tokens per delegated sub-agent
  history_limit: 100              # recent sub-agent runs kept in memory

storage:
  data_dir: "./data"
  log_level: "INFO"

artifacts:
  max_file_bytes: 20971520       # 20 MiB per managed outbound artifact
  max_per_turn: 10
  retention_hours: 24

compression:
  engine: "compressor"       # compressor (built-in) | lcm (future)
  model: ""                  # empty = use main model; set = cheap model
  max_tokens: 500
  tail_token_budget: 20000
  threshold_ratio: 0.6

toolsets:
  enabled: ["all"]            # ["all"] | ["web","terminal","utility"] | etc.

memory:
  external_provider: "luna"      # luna | lumora | mem0 | fallback | none
  review:
    external_turn_interval: 10
    internal_turn_interval: 50
    internal_buffer_limit: 20
    snapshot_refresh_turn_interval: 20
    worker_concurrency: 2
  llm:
    provider: "inherit"
    model: ""
    api_mode: "auto"
    max_tokens: 2048
  providers:
    luna:
      embedding:
        provider: "openai_compatible"
        base_url: "https://llm-emwc1qhbxb5bsk0u.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
        api_key_env: "DASHSCOPE_API_KEY"
        model: "text-embedding-v4"
        dimensions: 1024
        timeout_seconds: 30
        batch_size: 10
      vector:
        provider: "qdrant"
        path: "./data/memory/qdrant"
        collection: "lumora_memories"  # 保留现有 collection，避免改名后丢失历史向量
      keyword:
        provider: "sqlite_fts5"
        tokenizer: "unicode61"
      fusion:
        provider: "weighted_rrf"
        semantic_weight: 0.6
        keyword_weight: 0.4
        importance_weight: 0.1
        rrf_k: 60
      reranker:
        provider: "none"
      retrieval:
        semantic_timeout_seconds: 35
        keyword_timeout_seconds: 5
        reranker_timeout_seconds: 30
    mem0:
      options: {}

multimodal:
  enabled: true                    # true = 接收平台附件并进入统一处理链路
  image_mode: "auto"               # 图片：auto | native | text | off
  audio_mode: "auto"               # 音频：auto | text | off；当前无转写能力时会降级提示
  video_mode: "off"                # 视频：auto | text | off；默认关闭，避免误下载大文件
  file_mode: "auto"                # 文件：auto | text | off；当前无解析器时会降级提示
  native_fallback: "notice"        # 原生多模态不可用时：notice（提示）| text（尝试文本化）
  text_extract_max_chars: 12000     # 文本/PDF/docx 附件最多注入的字符数，超出会截断
  text_extract_pdf_max_pages: 20    # PDF 附件最多抽取页数，避免大文件污染上下文
  image_text_mode: "auto"           # 图片文本化：auto | vision | ocr | off；当前默认只预留链路
  image_text_cache: true            # 是否缓存图片文本化结果，后续 vision/OCR 会复用
  image_text_max_chars: 6000        # 图片文本化结果最多注入的字符数
  image_text_provider: "openai"           # 可选视觉辅助 provider，例如 openai / anthropic；密钥用 .env 的 IMAGE_TEXT_API_KEY
  image_text_api_mode: "responses"
  image_text_model: "gpt-5.5"              # 可选视觉辅助模型，留空使用 provider 默认或主模型
  image_text_prompt: ""             # 可选自定义提示词，留空使用内置“提取文字并描述图片”
  ocr_endpoint: ""                  # 可选本地 OCR HTTP 服务，例如 http://127.0.0.1:7788
  ocr_timeout_seconds: 20           # OCR 服务请求超时秒数
  ocr_language: "auto"              # OCR 语言提示，具体支持取决于本地 OCR 服务

cron:
  enabled: false

session:
  expire_days: 30
  override: {}               # {"wechat:o9cq80:o9cq80": "wechat:custom:o9cq80"}

sandbox:
  roots:                           # writable directories for Local/Full Auto and bash
    - "."
    - "/mnt/c/Users/MR/Desktop/SJS-AGENT"
    - "/mnt/c/Users/MR/Desktop/luna workspace"
  read_roots:                      # native file tools may read, but never write or use via bash
    - "/home/sujinsheng"
  blocked:                         # never accessible — glob patterns, applies to all tools
    - "**/.env"
    - "**/.env.*"
    - "**/.git/**"
    - "**/.ssh/**"
    - "**/id_rsa*"
    - "**/.netrc"
    - "**/data/auth/**"
    - "**/node_modules/**"
    - "**/__pycache__/**"
    - "**/.venv/**"
    - "**/.claude/**"
    - "**/.codex/**"
    - "**/.aws/**"
    - "**/.kube/**"
    - "**/.gnupg/**"
    - "**/.docker/config.json"
    - "**/.config/gh/**"
    - "**/.config/gcloud/**"
    - "**/.npmrc"
    - "**/.pypirc"
    - "**/.pgpass"
    - "**/audit.log"
    - "**/pyproject.toml"
    - "**/config.yaml"
  bash_work_dir: "./data"          # bash cwd (relative paths resolved from here)
  bash_restrict_paths: true        # false = bash can access paths outside sandbox roots
  bash_allow_network: false        # true = allow curl/pip/wget in bash tool
  process_backend: "auto"         # auto | bwrap | legacy
  file_max_write_bytes: 100000     # max file_write size
  audit_enabled: true              # log to data/audit.log

auth:
  enabled: true               # true = enable auth (static + pairing)
  admins: []                  # admin user IDs (always pass, no challenge)
  allowed_users: []           # pre-approved user IDs (skip pairing)

profiles:
  # Map session_key → profile directory under data/system/
  # The matching profile's .md files replace the default system prompt.
  # Example: "wechat:<wx_id>:<wx_id>": "luna"
  # Fill in your own session keys below.
  "wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat": "luna"

plugins:
  dirs: ["./plugins", "./data/plugins"]
  enabled:
    - "integrations/codex-bridge"
    - "integrations/github-assistant"
    - "integrations/developer-docs"
    - "integrations/browser-operator"
    - "integrations/workspace-watch"
    - "automation/reminder"
    - "automation/feed-watch"
    - "automation/inbox-watch"
    - "productivity/document-converter"
  disabled: []
  config:
    integrations/workspace-watch:
      paths:
        - "data/workspace-watch-test.txt"
      session_key: "wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat"
      poll_interval_seconds: 2
      settle_seconds: 2
      active:
        enabled: true
        sessions:
          - "wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat"
        restart_backoff_seconds: [1, 2, 5]
    automation/reminder:
      max_overdue_seconds: 604800
      retry_delay_seconds: 60
      max_delivery_attempts: 3
      active:
        enabled: true
        sessions:
          - "wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat"
        restart_backoff_seconds: [1, 2, 5, 10, 30]
    automation/feed-watch:
      feeds:
        - name: "Codex Releases"
          url: "https://github.com/openai/codex/releases.atom"
          sessions:
            - "wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat"
      poll_interval_seconds: 900
      max_items_per_feed: 30
      # Watt Toolkit resolves this trusted public hostname to its local accelerator.
      trusted_private_hosts: ["github.com"]
      active:
        enabled: true
        sessions:
          - "wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat"
        restart_backoff_seconds: [1, 2, 5, 10, 30]
    automation/inbox-watch:
      root: "data/inbox"
      poll_interval_seconds: 15
      settle_seconds: 5
      max_files_per_poll: 20
      max_file_bytes: 20971520
      extensions: []
      process_existing: true
      active:
        enabled: true
        sessions:
          - "wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat"
        restart_backoff_seconds: [1, 2, 5, 10, 30]
    integrations/codex-bridge:
      command: "codex"
      source_codex_home: "/home/sujinsheng/.codex"
      runtime_codex_home: "./data/codex-bridge"
      cwd: "."
      sandbox: "workspace-write"
      connect_timeout_seconds: 60
      call_timeout_seconds: 1800
    integrations/github-assistant:
      repositories:
        - "openai/codex"
      write_enabled: false
      active:
        enabled: true
        sessions:
          - "wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat:o9cq80x_RML2zCXPUgbSoL7vFZzU@im.wechat"
      watch:
        pull_requests: true
        issues: true
        commits: true
        workflows: true
        poll_interval_seconds: 30
        per_page: 20
    integrations/developer-docs:
      command: "npx"
      package: "@upstash/context7-mcp"
      connect_timeout_seconds: 60
      call_timeout_seconds: 120
    integrations/browser-operator:
      command: "npx"
      package: "@playwright/mcp@0.0.78"
      browser: "chromium"
      headless: true
      isolated: true
      allowed_domains: []
      allow_file_upload: false
      allow_code_execution: false
      connect_timeout_seconds: 120
      call_timeout_seconds: 120
      max_artifact_bytes: 10485760

mcp:
  enabled: true               # enable MCP client subsystem
  servers:
    - name: "filesystem"
      transport: "stdio"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
      allow_network: true
      enabled: false  # native file tools already enforce sandbox/blocked paths

    - name: "memory"
      transport: "stdio"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-memory"]
      env:
        MEMORY_FILE_PATH: "./data/mcp/memory.jsonl"
      allow_network: true
      enabled: true

    - name: "sequential-thinking"
      transport: "stdio"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
      allow_network: true
      enabled: true

    - name: "time"
      transport: "stdio"
      command: "uvx"
      args: ["mcp-server-time", "--local-timezone", "Asia/Shanghai"]
      connect_timeout_seconds: 60
      allow_network: true
      enabled: true

    - name: "fetch"
      transport: "stdio"
      command: "uvx"
      args: ["mcp-server-fetch"]
      connect_timeout_seconds: 60
      allow_network: true
      enabled: true
