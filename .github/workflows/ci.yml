name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test / Linux / Python 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Install Linux sandbox dependency
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          # Ubuntu 24.04 enables AppArmor restrictions for unprivileged user
          # namespaces. GitHub-hosted runners are disposable, so relax this
          # host-only setting for the Bubblewrap integration checks.
          if [ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns >/dev/null
          fi
          bwrap --ro-bind / / --unshare-user-try -- /bin/true

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          python-version: "3.12"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Compile Python sources
        run: uv run --frozen python -m compileall -q src/luna_agent packages/luna-agent-plugin-sdk/src scripts

      - name: Run test suite
        run: uv run --frozen pytest -q

  windows-appcontainer:
    name: AppContainer smoke / Windows
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          python-version: "3.12"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Check PowerShell 7
        shell: pwsh
        run: pwsh --version

      - name: Run Windows runtime tests
        run: uv run --frozen pytest -q tests/test_windows_runtime.py tests/test_windows_shell_broker.py

      - name: Run native AppContainer smoke gate
        run: uv run --frozen python scripts/windows_plugin_appcontainer_smoke.py
