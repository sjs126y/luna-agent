name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test / Linux / Python 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          python-version: "3.12"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Compile Python sources
        run: uv run --frozen python -m compileall -q src/luna_agent packages/luna-agent-plugin-sdk/src scripts

      - name: Run test suite
        run: uv run --frozen pytest -q

  windows-appcontainer:
    name: AppContainer smoke / Windows
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          python-version: "3.12"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Run native AppContainer smoke gate
        run: uv run --frozen python scripts/windows_plugin_appcontainer_smoke.py
